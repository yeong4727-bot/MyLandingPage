<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/favicon.png" />
    <meta name="theme-color" content="#0b0b0c" />
    <meta name="application-name" content="NY Studio" />
    <meta name="apple-mobile-web-app-title" content="NY Studio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>로그인 | NY Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #0b0b0c;
        --ink: #f4f0e8;
        --muted: #aaa49a;
        --line: rgba(244, 240, 232, 0.14);
        --paper: #111113;
        --paper-strong: #171719;
        --accent: #d8b56d;
        --accent-dark: #f4f0e8;
        --danger: #f07f72;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Pretendard, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(216, 181, 109, 0.1), transparent 42%),
          var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page {
        width: min(560px, calc(100% - 36px));
        margin: 0 auto;
        padding: 42px 0 72px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 42px;
      }

      .ghost-button {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .ghost-button:hover {
        border-color: rgba(244, 240, 232, 0.42);
        background: rgba(255, 255, 255, 0.06);
        color: #ffffff;
      }

      .layout {
        display: flex;
        justify-content: center;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .panel {
        width: min(100%, 420px);
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .panel h2 {
        font-size: 26px;
        line-height: 1.1;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      input {
        width: 100%;
        height: 46px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--paper-strong);
        color: var(--ink);
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(216, 181, 109, 0.14);
      }

      .password-wrap {
        position: relative;
      }

      .password-wrap input {
        padding-right: 48px;
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 8px;
        display: inline-grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        transform: translateY(-50%);
      }

      .toggle-password:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
      }

      .eye-icon {
        width: 19px;
        height: 19px;
      }

      .submit {
        width: 100%;
        min-height: 48px;
        margin-top: 18px;
        border: 1px solid var(--ink);
        border-radius: 999px;
        background: var(--accent);
        color: #0b0b0c;
        font-weight: 900;
      }

      .submit:hover {
        background: var(--accent-dark);
      }

      .submit:disabled {
        cursor: not-allowed;
        background: #a6a198;
      }

      .signup-button {
        display: inline-flex;
        width: 100%;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        font-weight: 900;
      }

      .signup-button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .notice,
      .field-message {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
        font-weight: 750;
      }

      .notice.error {
        color: var(--danger);
      }

      .notice.valid {
        color: var(--accent);
      }

      @media (max-width: 820px) {
        .page {
          width: min(100% - 28px, 620px);
          padding: 28px 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="ghost-button" href="index.html">NY Studio</a>
        <a class="ghost-button" href="index.html">Portfolio</a>
      </header>

      <section class="layout" aria-label="로그인">
        <form class="panel" id="loginForm">
          <h2>로그인</h2>
          <p class="notice" id="loginNotice">가입한 이메일과 비밀번호를 입력해주세요.</p>

          <div class="field">
            <label for="loginEmail">이메일</label>
            <input id="loginEmail" autocomplete="email" placeholder="name@example.com" />
          </div>

          <div class="field">
            <label for="loginPassword">비밀번호</label>
            <div class="password-wrap">
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="비밀번호" />
              <button class="toggle-password" type="button" data-target="loginPassword" aria-label="비밀번호 보기">
                <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="2" />
                  <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
              </button>
            </div>
          </div>

          <button class="submit" id="loginButton" type="submit">로그인</button>
          <a class="signup-button" href="signup.html">회원가입하기</a>
        </form>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://qzekurrfmswtfavispiw.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_jA0sfF_RlCSoRBr5n1ndEg_1N9byiDW";
      const loginForm = document.querySelector("#loginForm");
      const loginEmail = document.querySelector("#loginEmail");
      const loginPassword = document.querySelector("#loginPassword");
      const loginButton = document.querySelector("#loginButton");
      const loginNotice = document.querySelector("#loginNotice");
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      let supabaseClient = null;

      const setNotice = (element, message, state = "info") => {
        element.textContent = message;
        element.classList.toggle("error", state === "error");
        element.classList.toggle("valid", state === "valid");
      };

      const createClient = () => {
        if (!window.supabase) {
          supabaseClient = null;
          loginButton.disabled = true;
          setNotice(loginNotice, "로그인 모듈을 불러오지 못했어요. 잠시 후 다시 시도해주세요.", "error");
          return false;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
          },
        });
        loginButton.disabled = false;
        return true;
      };

      document.querySelectorAll(".toggle-password").forEach((button) => {
        button.addEventListener("click", () => {
          const target = document.querySelector(`#${button.dataset.target}`);
          const isHidden = target.type === "password";

          target.type = isHidden ? "text" : "password";
          button.setAttribute("aria-label", isHidden ? "비밀번호 숨기기" : "비밀번호 보기");
        });
      });

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!supabaseClient) {
          setNotice(loginNotice, "로그인 모듈을 불러오지 못했어요. 잠시 후 다시 시도해주세요.", "error");
          return;
        }

        const email = loginEmail.value.trim();
        const password = loginPassword.value;

        if (!emailPattern.test(email) || !password) {
          setNotice(loginNotice, "이메일과 비밀번호를 확인해주세요.", "error");
          return;
        }

        loginButton.disabled = true;
        loginButton.textContent = "로그인 중...";

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

        loginButton.disabled = false;
        loginButton.textContent = "로그인";

        if (error) {
          setNotice(loginNotice, `로그인 실패: ${error.message}`, "error");
          return;
        }

        setNotice(loginNotice, "로그인되었습니다. 메인으로 이동합니다.", "valid");
        window.location.href = "index.html";
      });

      createClient();
    </script>
  </body>
</html>
