<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/favicon.png" />
    <meta name="theme-color" content="#0b0b0c" />
    <meta name="application-name" content="NY Studio" />
    <meta name="apple-mobile-web-app-title" content="NY Studio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>회원가입 | NY Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #0b0b0c;
        --ink: #f4f0e8;
        --muted: #aaa49a;
        --line: rgba(244, 240, 232, 0.14);
        --paper: #111113;
        --paper-strong: #171719;
        --accent: #d8b56d;
        --accent-dark: #f4f0e8;
        --blue: #8ea7ff;
        --danger: #f07f72;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Pretendard, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(216, 181, 109, 0.1), transparent 42%),
          var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page {
        width: min(720px, calc(100% - 36px));
        margin: 0 auto;
        padding: 92px 0 42px;
      }

      .topbar {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }

      .back-button {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        justify-content: center;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .back-button:hover {
        border-color: rgba(244, 240, 232, 0.42);
        background: rgba(255, 255, 255, 0.06);
        color: #ffffff;
      }

      .layout {
        display: flex;
        justify-content: center;
      }

      .panel {
        width: 100%;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .panel h2 {
        font-size: 26px;
        line-height: 1.1;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 14px;
      }

      .field-full,
      .password-fields {
        grid-column: 1 / -1;
      }

      .password-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 14px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .username-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .check-button {
        min-height: 46px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        font-weight: 850;
      }

      .check-button:hover {
        border-color: rgba(244, 240, 232, 0.42);
        background: rgba(255, 255, 255, 0.06);
      }

      .check-button:disabled {
        cursor: not-allowed;
        opacity: 0.54;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      input {
        width: 100%;
        height: 46px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--paper-strong);
        color: var(--ink);
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(216, 181, 109, 0.14);
      }

      .password-wrap {
        position: relative;
      }

      .password-wrap input {
        padding-right: 48px;
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 8px;
        display: inline-grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        transform: translateY(-50%);
      }

      .toggle-password:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
      }

      .eye-icon {
        width: 19px;
        height: 19px;
      }

      .submit {
        width: 100%;
        min-height: 48px;
        margin-top: 18px;
        border: 1px solid var(--ink);
        border-radius: 999px;
        background: var(--accent);
        color: #0b0b0c;
        font-weight: 900;
      }

      .submit:hover {
        background: var(--accent-dark);
      }

      .submit:disabled {
        cursor: not-allowed;
        background: #a6a198;
      }

      .notice,
      .field-message {
        color: var(--blue);
        font-size: 12px;
        line-height: 1.5;
        font-weight: 800;
      }

      .notice {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .notice:empty {
        display: none;
      }

      .notice.error,
      .field-message.error {
        color: var(--danger);
      }

      .notice.valid,
      .field-message.valid {
        color: var(--accent);
      }

      @media (max-width: 900px) {
        .page {
          width: min(100% - 28px, 640px);
          padding: 78px 0 28px;
        }

        .form-grid,
        .password-fields,
        .username-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="back-button" href="login.html">← 뒤로가기</a>
      </header>

      <section class="layout" aria-label="회원가입">
        <form class="panel" id="signupForm">
          <h2>회원가입</h2>
          <p class="notice" id="signupNotice"></p>

          <div class="form-grid">
            <div class="field">
              <label for="signupUsername">아이디</label>
              <div class="username-row">
                <input id="signupUsername" autocomplete="username" maxlength="20" placeholder="young123" />
                <button class="check-button" id="checkUsername" type="button">중복 확인</button>
              </div>
              <div class="field-message" id="usernameMessage">영문 소문자와 숫자만, 4~20자</div>
            </div>

            <div class="field">
              <label for="signupEmail">이메일</label>
              <input id="signupEmail" type="email" autocomplete="email" placeholder="name@example.com" />
              <div class="field-message" id="emailMessage">이메일 형식으로 입력해주세요.</div>
            </div>

            <div class="field field-full">
              <label for="signupPhone">전화번호</label>
              <input id="signupPhone" inputmode="numeric" maxlength="11" placeholder="01012345678" />
              <div class="field-message" id="phoneMessage">010으로 시작하는 숫자 11자리</div>
            </div>

            <div class="password-fields">
              <div class="field">
                <label for="signupPassword">비밀번호</label>
                <div class="password-wrap">
                  <input id="signupPassword" type="password" autocomplete="new-password" placeholder="Password1!" />
                  <button class="toggle-password" type="button" data-target="signupPassword" aria-label="비밀번호 보기">
                    <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="2" />
                      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2" />
                    </svg>
                  </button>
                </div>
                <div class="field-message" id="passwordMessage">8자 이상, 대문자/소문자/숫자/특수문자 포함</div>
              </div>

              <div class="field">
                <label for="signupPasswordConfirm">비밀번호 확인</label>
                <div class="password-wrap">
                  <input id="signupPasswordConfirm" type="password" autocomplete="new-password" placeholder="비밀번호 재입력" />
                  <button class="toggle-password" type="button" data-target="signupPasswordConfirm" aria-label="비밀번호 확인 보기">
                    <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="2" />
                      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2" />
                    </svg>
                  </button>
                </div>
                <div class="field-message" id="passwordConfirmMessage">비밀번호를 한 번 더 입력해주세요.</div>
              </div>
            </div>
          </div>

          <button class="submit" id="signupButton" type="submit">회원가입</button>
        </form>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://qzekurrfmswtfavispiw.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_jA0sfF_RlCSoRBr5n1ndEg_1N9byiDW";
      const profileTableName = "profiles";
      const signupForm = document.querySelector("#signupForm");
      const signupUsername = document.querySelector("#signupUsername");
      const signupEmail = document.querySelector("#signupEmail");
      const signupPhone = document.querySelector("#signupPhone");
      const signupPassword = document.querySelector("#signupPassword");
      const signupPasswordConfirm = document.querySelector("#signupPasswordConfirm");
      const checkUsername = document.querySelector("#checkUsername");
      const usernameMessage = document.querySelector("#usernameMessage");
      const emailMessage = document.querySelector("#emailMessage");
      const phoneMessage = document.querySelector("#phoneMessage");
      const passwordMessage = document.querySelector("#passwordMessage");
      const passwordConfirmMessage = document.querySelector("#passwordConfirmMessage");
      const signupButton = document.querySelector("#signupButton");
      const signupNotice = document.querySelector("#signupNotice");
      const usernamePattern = /^[a-z0-9]{4,20}$/;
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phonePattern = /^010[0-9]{8}$/;
      const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
      let supabaseClient = null;
      let isUsernameAvailable = false;

      const setMessage = (element, message, state = "info") => {
        element.textContent = message;
        element.classList.toggle("valid", state === "valid");
        element.classList.toggle("error", state === "error");
      };

      const createClient = () => {
        if (!window.supabase) {
          supabaseClient = null;
          signupButton.disabled = true;
          setMessage(signupNotice, "회원가입 모듈을 불러오지 못했어요. 잠시 후 다시 시도해주세요.", "error");
          return false;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
          },
        });
        signupButton.disabled = false;
        return true;
      };

      const validateUsernamePattern = () => {
        const username = signupUsername.value.trim();
        isUsernameAvailable = false;

        if (!usernamePattern.test(username)) {
          setMessage(usernameMessage, "영문 소문자와 숫자만 사용해 4~20자로 입력해주세요.", "error");
          return false;
        }

        setMessage(usernameMessage, "아이디 형식이 올바릅니다. 중복 확인을 해주세요.");
        return true;
      };

      const checkUsernameDuplicate = async () => {
        const username = signupUsername.value.trim();
        isUsernameAvailable = false;

        if (!usernamePattern.test(username)) {
          setMessage(usernameMessage, "영문 소문자와 숫자만 사용해 4~20자로 입력해주세요.", "error");
          return false;
        }

        if (!supabaseClient) {
          setMessage(usernameMessage, "Supabase 연결 후 중복 검사를 할 수 있어요.", "error");
          return false;
        }

        checkUsername.disabled = true;
        checkUsername.textContent = "확인 중...";
        setMessage(usernameMessage, "아이디 중복 확인 중...");

        const { data, error } = await supabaseClient.rpc("is_username_available", {
          username_to_check: username,
        });

        checkUsername.disabled = false;
        checkUsername.textContent = "중복 확인";

        if (error) {
          setMessage(usernameMessage, `중복 검사 실패: ${error.message}`, "error");
          return false;
        }

        if (!data) {
          setMessage(usernameMessage, "이미 사용 중인 아이디입니다.", "error");
          return false;
        }

        isUsernameAvailable = true;
        setMessage(usernameMessage, "사용 가능한 아이디입니다.", "valid");
        return true;
      };

      const validateEmail = () => {
        const email = signupEmail.value.trim();

        if (emailPattern.test(email)) {
          setMessage(emailMessage, "사용 가능한 이메일 형식입니다.", "valid");
          return true;
        }

        setMessage(emailMessage, "이메일 형식으로 입력해주세요. 예: name@example.com", "error");
        return false;
      };

      const validatePhone = () => {
        const phone = signupPhone.value.trim();

        if (phonePattern.test(phone)) {
          setMessage(phoneMessage, "사용 가능한 전화번호 형식입니다.", "valid");
          return true;
        }

        setMessage(phoneMessage, "010으로 시작하는 숫자 11자리를 입력해주세요.");
        return false;
      };

      const validatePassword = () => {
        const password = signupPassword.value;

        if (passwordPattern.test(password)) {
          setMessage(passwordMessage, "안전한 비밀번호 형식입니다.", "valid");
          return true;
        }

        setMessage(passwordMessage, "8자 이상, 대문자/소문자/숫자/특수문자를 모두 포함해주세요.", "error");
        return false;
      };

      const validatePasswordConfirm = () => {
        if (!signupPasswordConfirm.value) {
          setMessage(passwordConfirmMessage, "비밀번호를 한 번 더 입력해주세요.");
          return false;
        }

        if (signupPassword.value === signupPasswordConfirm.value) {
          setMessage(passwordConfirmMessage, "비밀번호가 일치합니다.", "valid");
          return true;
        }

        setMessage(passwordConfirmMessage, "비밀번호가 일치하지 않습니다.", "error");
        return false;
      };

      signupUsername.addEventListener("input", () => {
        signupUsername.value = signupUsername.value.toLowerCase().replace(/[^a-z0-9]/g, "");
        isUsernameAvailable = false;
        validateUsernamePattern();
      });

      checkUsername.addEventListener("click", checkUsernameDuplicate);

      signupEmail.addEventListener("input", validateEmail);

      signupPhone.addEventListener("input", () => {
        signupPhone.value = signupPhone.value.replace(/\D/g, "").slice(0, 11);
        validatePhone();
      });

      signupPassword.addEventListener("input", () => {
        validatePassword();
        validatePasswordConfirm();
      });

      signupPasswordConfirm.addEventListener("input", validatePasswordConfirm);

      document.querySelectorAll(".toggle-password").forEach((button) => {
        button.addEventListener("click", () => {
          const target = document.querySelector(`#${button.dataset.target}`);
          const isHidden = target.type === "password";

          target.type = isHidden ? "text" : "password";
          button.setAttribute("aria-label", isHidden ? "비밀번호 숨기기" : "비밀번호 보기");
        });
      });

      signupForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!supabaseClient) {
          setMessage(signupNotice, "회원가입 모듈을 불러오지 못했어요. 잠시 후 다시 시도해주세요.", "error");
          return;
        }

        const username = signupUsername.value.trim();
        const email = signupEmail.value.trim();
        const phone = signupPhone.value.trim();
        const password = signupPassword.value;

        const usernameOk = isUsernameAvailable || await checkUsernameDuplicate();
        const formOk = [
          usernameOk,
          validateEmail(),
          validatePhone(),
          validatePassword(),
          validatePasswordConfirm(),
        ].every(Boolean);

        if (!formOk) {
          setMessage(signupNotice, "입력값을 다시 확인해주세요.", "error");
          return;
        }

        signupButton.disabled = true;
        signupButton.textContent = "가입 중...";
        setMessage(signupNotice, "Supabase Auth 계정을 만드는 중입니다.");

        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: { username, phone },
          },
        });

        if (error || !data.user) {
          signupButton.disabled = false;
          signupButton.textContent = "회원가입";
          setMessage(signupNotice, `회원가입 실패: ${error?.message || "사용자 정보를 받지 못했습니다."}`, "error");
          return;
        }

        const { error: profileError } = await supabaseClient.from(profileTableName).insert({
          id: data.user.id,
          username,
          email,
          phone,
        });

        if (profileError) {
          signupButton.disabled = false;
          signupButton.textContent = "회원가입";
          setMessage(signupNotice, `프로필 저장 실패: ${profileError.message}`, "error");
          return;
        }

        const { error: loginError } = await supabaseClient.auth.signInWithPassword({ email, password });

        signupButton.disabled = false;
        signupButton.textContent = "회원가입";

        if (loginError) {
          setMessage(signupNotice, "가입은 완료됐습니다. 이메일 확인 후 로그인해주세요.", "error");
          return;
        }

        alert("환영합니다!");
        window.location.href = "index.html";
      });

      createClient();
    </script>
  </body>
</html>
